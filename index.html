<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/icons/icon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#EAB308" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hambre" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon.jpg" />
    <title>Hambre</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Self-healing: if a JS/CSS asset fails to load (stale cache),
      // automatically clear all caches, unregister SW, and reload.
      // This runs ONCE per broken load — users never need to do anything.
      (function() {
        var hasReloaded = sessionStorage.getItem('cache-busted');

        window.addEventListener('error', function(e) {
          var el = e.target;
          if (el && (el.tagName === 'SCRIPT' || el.tagName === 'LINK') && !hasReloaded) {
            console.warn('Asset failed to load, clearing caches and reloading...');
            sessionStorage.setItem('cache-busted', 'true');

            if ('caches' in window) {
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(name) { return caches.delete(name); }));
              }).then(function() {
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(regs) {
                    regs.forEach(function(r) { r.unregister(); });
                    window.location.reload(true);
                  });
                } else {
                  window.location.reload(true);
                }
              });
            } else {
              window.location.reload(true);
            }
          }
        }, true); // use capture phase to catch resource errors

        // Clear the flag after successful load so it can self-heal again next time
        window.addEventListener('load', function() {
          sessionStorage.removeItem('cache-busted');
        });
      })();

      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js').then(function(registration) {
            // Force update check on every page load
            registration.update();
            console.log('ServiceWorker registered with scope:', registration.scope);
          }, function(err) {
            console.log('ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
